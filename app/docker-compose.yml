services:
  app:
    build:
      context: .
      target: runtime
    restart: unless-stopped
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3000
      BASE_PATH: ${BASE_PATH:-/}
      APP_DATA_DIR: /app/data
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5-mini}
      OPENAI_HEAVY_MODEL: ${OPENAI_HEAVY_MODEL:-gpt-5.4}
    ports:
      - "${APP_PORT_EXPOSE:-}:3000"
    volumes:
      - type: volume
        source: comic-book-data
        target: /app/data

volumes:
  comic-book-data:
